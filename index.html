<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hush</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="logging">
        <h1>Welcome to Hush</h1>
        <p>Feeling lonely? Join the conversation!</p>
        <div id="userClicks">
            <input type="text" placeholder="Your nickname" id="nickname">
            <button onclick="joinHush()" id="join-button">Join Hush</button>
        </div>
    </div>
    <div hidden id="chat">
        <h1>Hush Chat</h1>
        <div id="messages" style="border: black solid 1px;">
            <!-- Messages will appear here -->
        </div>
        <input type="text" id="message-input" placeholder="Your Message">
        <button onClick="sendMessage()" id="send-button">Send</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
